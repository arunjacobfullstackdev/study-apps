name: turborepo-web-dev

services:
  api:
    image: node:22-bookworm-slim
    working_dir: /workspace
    environment:
      HUSKY: "0"
      PNPM_HOME: /pnpm
      PNPM_STORE_DIR: /pnpm/store
      PORT: "4000"
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@9.0.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter api dev"
    volumes:
      - .:/workspace
      - web_api_dev_node_modules:/workspace/node_modules
      - web_api_dev_pnpm_store:/pnpm/store
    ports:
      - "4000:4000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    environment:
      HUSKY: "0"
      PNPM_HOME: /pnpm
      PNPM_STORE_DIR: /pnpm/store
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@9.0.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter web dev"
    volumes:
      - .:/workspace
      - web_dev_node_modules:/workspace/node_modules
      - web_dev_pnpm_store:/pnpm/store
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  web_api_dev_node_modules:
  web_api_dev_pnpm_store:
  web_dev_node_modules:
  web_dev_pnpm_store:
