name: turborepo-api-dev

services:
  api:
    image: node:22-bookworm-slim
    working_dir: /workspace
    environment:
      HUSKY: "0"
      PNPM_HOME: /pnpm
      PNPM_STORE_DIR: /pnpm/store
      PORT: "4000"
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@9.0.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter api dev"
    volumes:
      - .:/workspace
      - api_dev_node_modules:/workspace/node_modules
      - api_dev_pnpm_store:/pnpm/store
    ports:
      - "4000:4000"

  dotnet-api:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /workspace
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://0.0.0.0:5050"
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
    command: >
      sh -c "dotnet restore dotnet.sln &&
      dotnet watch --project apps/dotnet-api/dotnet-api.csproj run --urls http://0.0.0.0:5050"
    volumes:
      - .:/workspace
      - dotnet_api_dev_nuget:/root/.nuget/packages
    ports:
      - "5050:5050"

volumes:
  api_dev_node_modules:
  api_dev_pnpm_store:
  dotnet_api_dev_nuget:
